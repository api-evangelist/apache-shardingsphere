openapi: 3.0.3
info:
  title: Apache ShardingSphere REST API
  description: Apache ShardingSphere is a distributed SQL transaction and query engine that transforms any database into a distributed database system. This API provides REST endpoints for managing sharding rules, data sources, read-write splitting, and cluster configuration via DistSQL.
  version: 5.4.0
  contact:
    name: Apache ShardingSphere
    url: https://shardingsphere.apache.org/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  - url: https://shardingsphere.example.com/api
    description: Apache ShardingSphere REST API

paths:
  /databases:
    get:
      operationId: listDatabases
      summary: Apache ShardingSphere List Databases
      description: List all logical databases registered in ShardingSphere.
      tags: [Databases]
      x-microcks-operation:
        dispatcher: RANDOM
      responses:
        '200':
          description: List of databases
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseList'
    post:
      operationId: createDatabase
      summary: Apache ShardingSphere Create Database
      description: Register a new logical database in ShardingSphere.
      tags: [Databases]
      x-microcks-operation:
        dispatcher: RANDOM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatabaseRequest'
      responses:
        '200':
          description: Database created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Database'
  /databases/{databaseName}:
    get:
      operationId: getDatabase
      summary: Apache ShardingSphere Get Database
      description: Get details of a specific ShardingSphere database.
      tags: [Databases]
      x-microcks-operation:
        dispatcher: URI_PARTS
        dispatcherRules: databaseName
      parameters:
        - name: databaseName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Database details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Database'
    delete:
      operationId: deleteDatabase
      summary: Apache ShardingSphere Delete Database
      description: Unregister a logical database from ShardingSphere.
      tags: [Databases]
      x-microcks-operation:
        dispatcher: URI_PARTS
        dispatcherRules: databaseName
      parameters:
        - name: databaseName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Database deleted
  /databases/{databaseName}/data-sources:
    get:
      operationId: listDataSources
      summary: Apache ShardingSphere List Data Sources
      description: List all physical data sources for a logical database.
      tags: [DataSources]
      x-microcks-operation:
        dispatcher: URI_PARTS
        dispatcherRules: databaseName
      parameters:
        - name: databaseName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of data sources
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataSourceList'
    post:
      operationId: addDataSource
      summary: Apache ShardingSphere Add Data Source
      description: Register a physical data source for use with ShardingSphere.
      tags: [DataSources]
      x-microcks-operation:
        dispatcher: URI_PARTS
        dispatcherRules: databaseName
      parameters:
        - name: databaseName
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataSourceRequest'
      responses:
        '200':
          description: Data source added
  /databases/{databaseName}/rules/sharding:
    get:
      operationId: getShardingRules
      summary: Apache ShardingSphere Get Sharding Rules
      description: Get sharding rules configured for a database.
      tags: [ShardingRules]
      x-microcks-operation:
        dispatcher: URI_PARTS
        dispatcherRules: databaseName
      parameters:
        - name: databaseName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Sharding rules
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShardingRuleList'
  /databases/{databaseName}/rules/readwrite-splitting:
    get:
      operationId: getReadwriteSplittingRules
      summary: Apache ShardingSphere Get Readwrite Splitting Rules
      description: Get read-write splitting rules configured for a database.
      tags: [ReadwriteSplitting]
      x-microcks-operation:
        dispatcher: URI_PARTS
        dispatcherRules: databaseName
      parameters:
        - name: databaseName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Readwrite splitting rules
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadwriteSplittingRuleList'
  /cluster/status:
    get:
      operationId: getClusterStatus
      summary: Apache ShardingSphere Get Cluster Status
      description: Get the current status of the ShardingSphere cluster.
      tags: [Cluster]
      x-microcks-operation:
        dispatcher: RANDOM
      responses:
        '200':
          description: Cluster status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterStatus'

components:
  schemas:
    DatabaseList:
      type: object
      description: List of ShardingSphere logical databases
      properties:
        databases:
          type: array
          items:
            $ref: '#/components/schemas/Database'
    Database:
      type: object
      description: ShardingSphere logical database
      properties:
        name:
          type: string
          description: Database name
        dataSources:
          type: array
          items:
            type: string
          description: Registered data source names
    DatabaseRequest:
      type: object
      description: Request to create a logical database
      required: [name]
      properties:
        name:
          type: string
          description: Database name
    DataSourceList:
      type: object
      description: List of physical data sources
      properties:
        dataSources:
          type: array
          items:
            $ref: '#/components/schemas/DataSource'
    DataSource:
      type: object
      description: Physical data source configuration
      properties:
        name:
          type: string
          description: Data source name
        url:
          type: string
          description: JDBC connection URL
        username:
          type: string
          description: Database username
        maxPoolSize:
          type: integer
          description: Maximum connection pool size
        minPoolSize:
          type: integer
          description: Minimum connection pool size
        type:
          type: string
          description: Connection pool type (HikariCP, etc.)
    DataSourceRequest:
      type: object
      description: Request to add a data source
      required: [name, url, username, password]
      properties:
        name:
          type: string
          description: Data source name
        url:
          type: string
          description: JDBC connection URL
        username:
          type: string
        password:
          type: string
        maxPoolSize:
          type: integer
    ShardingRuleList:
      type: object
      description: List of sharding rules
      properties:
        rules:
          type: array
          items:
            $ref: '#/components/schemas/ShardingRule'
    ShardingRule:
      type: object
      description: Sharding rule for a logical table
      properties:
        name:
          type: string
          description: Rule name
        tables:
          type: array
          items:
            $ref: '#/components/schemas/ShardingTable'
        bindingTables:
          type: array
          items:
            type: array
            items:
              type: string
    ShardingTable:
      type: object
      description: Sharding configuration for a logical table
      properties:
        logicTable:
          type: string
          description: Logical table name
        actualDataNodes:
          type: string
          description: Actual data nodes expression (e.g. ds${0..1}.orders${0..3})
        databaseStrategy:
          $ref: '#/components/schemas/ShardingStrategy'
        tableStrategy:
          $ref: '#/components/schemas/ShardingStrategy'
    ShardingStrategy:
      type: object
      description: Sharding strategy definition
      properties:
        type:
          type: string
          enum: [standard, complex, hint, none]
          description: Strategy type
        shardingColumn:
          type: string
          description: Column used for sharding
        shardingAlgorithmName:
          type: string
          description: Sharding algorithm reference
    ReadwriteSplittingRuleList:
      type: object
      description: List of read-write splitting rules
      properties:
        rules:
          type: array
          items:
            $ref: '#/components/schemas/ReadwriteSplittingRule'
    ReadwriteSplittingRule:
      type: object
      description: Read-write splitting configuration
      properties:
        name:
          type: string
          description: Rule name
        writeDataSourceName:
          type: string
          description: Primary/write data source
        readDataSourceNames:
          type: array
          items:
            type: string
          description: Replica/read data sources
        loadBalancerName:
          type: string
          description: Load balancer algorithm name
    ClusterStatus:
      type: object
      description: ShardingSphere cluster status
      properties:
        mode:
          type: string
          enum: [Standalone, Cluster]
          description: Deployment mode
        instances:
          type: array
          items:
            $ref: '#/components/schemas/Instance'
    Instance:
      type: object
      description: ShardingSphere Proxy instance
      properties:
        instanceId:
          type: string
          description: Instance identifier
        status:
          type: string
          enum: [OK, CIRCUIT_BREAKER]
          description: Instance status
        host:
          type: string
          description: Host address
        port:
          type: integer
          description: Port number
